<main class="container">
    <div>
        <h1>Profile</h1>
        @if(isLoading()){
        <p>Loading...</p>
        } @else if (user()) {
        <div>
            <h2>{{user()!.username}}</h2>
        </div>
        }
    </div>
    <div>
        @if(user() && authService.getCurrentUserId() === user()!.id){
        <button>Edit</button>
        <button>Delete</button>
        }
    </div>
</main>
