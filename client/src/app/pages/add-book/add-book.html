<main class="container mx-auto max-w-lg mt-12 px-4">
    <h1 class="text-2xl font-bold mb-6">Create a Book</h1>

    <div class="flex flex-col gap-4">
        <p>Title</p>
        <input type="text" [(ngModel)]="title" placeholder="Book title"
            class="border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p>Author</p>
        <input type="text" [(ngModel)]="author" placeholder="Author name"
            class="border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p>Description</p>
        <input type="text" [(ngModel)]="description" placeholder="Book description"
            class="border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p>Upload PDF file</p>
        <input type="file" (change)="onFileChange($event)"
            class="border border-gray-300 px-3 py-2 rounded cursor-pointer">

        <button (click)="onSubmit()"
            class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded text-white cursor-pointer">
            Create Book
        </button>
    </div>
</main>
