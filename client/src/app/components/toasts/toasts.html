<div class="fixed bottom-4 right-4 flex flex-col gap-2">
    @for(toast of toasts(); track toast.id) {
    <div class="px-4 py-3 rounded shadow-lg text-white" [class.bg-emerald-500]="toast.type === 'success'"
        [class.bg-red-500]="toast.type === 'error'" [class.bg-blue-500]="toast.type === 'info'">
        {{ toast.message }}
    </div>
    }
</div>
